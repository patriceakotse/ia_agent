services:
  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8001:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/agent_orchestrator
      - SECRET_KEY=change-this-secret-key-in-production
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - XAI_API_KEY=${XAI_API_KEY}
      - OPENHANDS_URL=http://openhands:8000
    depends_on:
      - db
    volumes:
      - ./workspace:/workspace
    networks:
      - agent-network

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - backend
    networks:
      - agent-network

  # OpenHands Instance (Local Development)
  openhands:
    image: ghcr.io/openhands/agent-canvas:1.0.0-rc.11
    ports:
      - "8000:8000"
    volumes:
      - $HOME/.openhands:/home/openhands/.openhands
      - ./workspace:/projects
    networks:
      - agent-network

  # Database
  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=agent_orchestrator
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - agent-network

volumes:
  postgres_data:

networks:
  agent-network:
    driver: bridge