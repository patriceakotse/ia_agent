services:
  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/agent_orchestrator
      - SECRET_KEY=change-this-secret-key-in-production
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - XAI_API_KEY=${XAI_API_KEY}
      - OPENHANDS_URL=http://openhands:3000
      - OPENHANDS_API_KEY=${OPENHANDS_API_KEY:-local-dev}
    depends_on:
      - db
    volumes:
      - ./workspace:/workspace
    networks:
      - agent-network

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - backend
    networks:
      - agent-network

  # OpenHands Instance (Execution Arm)
  openhands:
    image: ghcr.io/all-hands/openhands:latest
    ports:
      - "3000:3000"
    environment:
      - OPENHANDS_API_KEY=${OPENHANDS_API_KEY:-local-dev}
      - SANDBOX_VOLUME=${PWD}/workspace:/workspace
    volumes:
      - ./workspace:/workspace
    networks:
      - agent-network

  # Database
  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=agent_orchestrator
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - agent-network

volumes:
  postgres_data:

networks:
  agent-network:
    driver: bridge